[config]

[templates.kitty]
input_path = '/home/naksdii/.config/matugen/templates/kitty-colors.conf'
output_path = '~/.config/kitty/colors.conf'
post_hook = 'pkill -SIGUSR1 kitty'

[templates.gtk3]
input_path = '/home/naksdii/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-3.0/colors.css'
post_hook = 'gsettings set org.gnome.desktop.interface gtk-theme ""; gsettings set org.gnome.desktop.interface gtk-theme adw-gtk3-{{mode}}'

[templates.gtk4]
input_path = '/home/naksdii/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-4.0/colors.css'

[templates.wlogout]
input_path = '/home/naksdii/.config/matugen/templates/colors.css'
output_path = '~/.config/wlogout/colors.css'

[templates.dunst]
input_path = '/home/naksdii/.config/matugen/templates/dunstrc-colors'
output_path = '~/.config/dunst/dunstrc'
post_hook = 'dunstctl reload'

[templates.cava]
input_path = '/home/naksdii/.config/matugen/templates/cava-color.ini'
output_path = '~/.config/cava/themes/theme'
post_hook = "pkill -USR1 cava"

[templates.btop]
input_path = '/home/naksdii/.config/matugen/templates/btop.theme'
output_path = '~/.config/btop/themes/matugen.theme'

[templates.hyprland]
input_path = '/home/naksdii/.config/matugen/templates/hyprland.conf'
output_path = '~/.config/hypr/colors.conf'
post_hook = 'hyprctl reload' 

[templates.waybar]
input_path = '/home/naksdii/.config/matugen/templates/colors.css'
output_path = '~/.config/waybar/colors.css'
post_hook = 'pkill -SIGURS2 waybar'

[templates.rofi]
input_path = '/home/joaogabriel/.config/matugen/templates/rofi-colors.rasi'
output_path = '/home/joaogabriel/.config/rofi/themes/colors.rasi'

[templates.helix]
input_path = 'templates/helix.toml'
output_path = '~/.config/helix/themes/matugen.toml'
